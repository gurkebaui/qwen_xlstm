# =============================================================================
# configs/base.yaml  —  single source of truth (single-field switches)
#
# Henry dislikes CLI-flag soup, so every knob lives here. Flip one field,
# don't touch code. Stage-1 scope only (continued pretraining, LoRA off).
# =============================================================================

model:
  name: "Qwen/Qwen2.5-Coder-0.5B"   # the trusty base, fully frozen
  dtype: "bfloat16"
  device: "cuda"

xlstm:                                  # OUR inserted mLSTM sublayer config
  embedding_dim: 896                     # MUST equal Qwen hidden (0.5B = 896)
  num_heads: 4                          # mLSTM heads
  context_length: 2048                  # recurrent kernel unroll length
  proj_factor: 2.0                     # inner up-projection multiplier
  conv1d_kernel: 4                      # causal conv kernel
  bias: false
  dropout: 0.0
  variant: "mlstm"                      # mLSTM now; sLSTM = later config option
  lora_on_base: false                   # Stage 1: NO LoRA (full-train the block)
  insert_all_layers: true                # graft into all 24 layers

train:                                  # Stage 1 = continued pretraining (CPT)
  mode: "cpt"                           # continued-pretraining, NOT sft/from-scratch
  learning_rate: 5.0e-4
  warmup_steps: 50
  max_steps: 2000
  per_device_batch: 1
  grad_accum: 1                          # VRAM-VERIFIED: 2048-seq x accum=2 OOMs
                                            # on 16GB. Keep seq_len*accum <= ~4096.
  seq_len: 2048
  identity_init: true                   # zero down-proj so step0 == frozen base
  # VRAM probe (scripts/vram_probe.py) results @ RTX4060Ti 16GB:
  #   2048 x accum=1  -> 13.9 GB  GO   (use this)
  #   2048 x accum=2  -> OOM
  #   1024 x accum=8  ->  7.2 GB  GO
  # effective batch = seq_len * per_device_batch * grad_accum

data:                                   # code / math / reasoning / agentic space
  # long-context code + math-code + some long text so memory is measurable.
  # NOTE: pg19/mathcoder streaming pragmatics TBD; we stream HF text
  # datasets. Subset/streaming only (no full-corpus download).
  sources:
    - "wikitext"                        # stand-in long-text (pg19 blocked, see notes #4)
    - "code:StarCoder-Data"            # long code files -> natural long-range
  eval_probe: "wikitext"                  # long-range ppl = direct memory test

eval:
  # fast, subset-only probe for the experimental stage (full suites come later)
  probe: "wikitext"       # long-text LM corpus, streams on datasets>=4.8
                          # (pg19 is the INTENDED long-range probe but its script
                          #  loader is dropped in datasets>=4.8; re-enable later)
  subsample: 32            # ONLY this many docs -> quick; bump later
  seq_len: 512            # truncate each doc to this many tokens
  train_baseline_compare: true   # val loss/ppl vs frozen base on same data
  downstream_later:         # run AFTER stage 1, not now
    - "HumanEval"
    - "MBPP"
    - "GSM8K"
    - "MATH-500"

paths:
  checkpoints: "checkpoints/"
  runs: "runs/"
  results: "results/"
