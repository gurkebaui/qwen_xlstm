# =============================================================================
# configs/base.yaml  —  single source of truth (single-field switches)
#
# Henry dislikes CLI-flag soup, so every knob lives here. Flip one field,
# don't touch code. Stage-1 scope only (continued pretraining, LoRA off).
# =============================================================================

model:
  name: "Qwen/Qwen2.5-Coder-0.5B"   # the trusty base, fully frozen
  dtype: "bfloat16"
  device: "cuda"

xlstm:                                  # OUR inserted mLSTM sublayer config
  embedding_dim: 896                     # MUST equal Qwen hidden (0.5B = 896)
  num_heads: 4                          # mLSTM heads
  context_length: 2048                  # recurrent kernel unroll length
  proj_factor: 2.0                     # inner up-projection multiplier
  conv1d_kernel: 4                      # causal conv kernel
  bias: false
  dropout: 0.0
  variant: "mlstm"                      # mLSTM now; sLSTM = later config option
  lora_on_base: false                   # Stage 1: NO LoRA (full-train the block)
  insert_all_layers: true                # graft into all 24 layers

train:                                  # Stage 1 = continued pretraining (CPT)
  mode: "cpt"                           # continued-pretraining, NOT sft/from-scratch
  learning_rate: 1.0e-4                  # LOWERED from 5e-4: 5e-4 diverged
                                          # the graft (first run: ppl 27->1494).
  warmup_steps: 50
  max_steps: 10000                      # overnight: ~50-90min @ ~0.5-0.9s/step
  per_device_batch: 1
  grad_accum: 2                          # accumulate 2x1024 = 2048 tokens/step.
                                            # 2048x1 OOMs at step1 (needs 14.65GB,
                                            # only 1.17 free). 1024x2 peak ~7-8GB SAFE.
  grad_clip: 1.0                         # clip grad norm (stability fix, notes #9/i)
  gate_steps: 20                         # validation gate: eval + abort if diverged
  seq_len: 1024                         # 1024 micro-batch x accum=2 = 2048 effective
  identity_init: true                   # zero down-proj + gate=0.1 -> step0 ~= base
  # VRAM probe (scripts/vram_probe.py) results @ RTX4060Ti 16GB:
  #   2048 x accum=1  -> OOM at step1 (14.65GB needed, 1.17 free)
  #   1024 x accum=1  -> 7.2 GB  GO
  #   1024 x accum=2  -> ~7-8 GB  GO  (USED: 2048 tokens/step, safe)
  #   1024 x accum=8  ->  7.2 GB  GO
  # effective batch = seq_len * per_device_batch * grad_accum

data:                                   # code / math / long-context (the memory space)
  # NOW AUTHENTICATED (HF token in token.txt line 2 unlocks gated sets):
  #   - bigcode/starcoderdata  -> real CODE (python subset) for code-ppl eval
  #   - emozilla/pg19         -> LONG BOOKS (100k+ tok each) = the real
  #                               long-range memory probe (bypasses the dropped
  #                               deepmind/pg19 scripted loader; this mirror
  #                               ships as parquet).
  # Mix = code + math + long-text + wikitext baseline.
  # Format: "hf_id" or "hf_id:subdir" (subdir -> datasets data_dir).
  sources:
    - "bigcode/starcoderdata:python"     # CODE (real signal for the graft)
    - "emozilla/pg19"                    # LONG BOOKS (long-range memory test)
    - "open-web-math/open-web-math"       # MATH web text
    - "HuggingFaceTB/smollm-corpus:fineweb-edu-dedup"  # long real web text
    - "wikitext"                          # LM baseline
  # eval probes (quick_eval supports any of these via cfg.eval.probe):
  eval_probes:
    - "wikitext"        # short-range LM ppl (baseline)
    - "bigcode/starcoderdata:python"  # code ppl (does the graft help code?)
    - "emozilla/pg19"   # long-context ppl (the memory question)

eval:
  # fast, subset-only probe for the experimental stage (full suites come later)
  eval_probes:                 # looped by quick_eval(); each -> ppl vs base
    - "wikitext"                         # short-range LM baseline
    - "bigcode/starcoderdata:python"   # code ppl (does the graft help code?)
    - "emozilla/pg19"                    # long-text ppl (pg19 mirror, parquet)
  subsample: 32            # ONLY this many docs per probe -> quick; bump later
  seq_len: 512            # truncate each doc to this many tokens
  long_context:           # THE memory probe (prefix > model window)
    enabled: true
    prefix_len: 4096      # > Qwen's effective 2048 window
    pred_len: 512
    probe: "emozilla/pg19"
    n_books: 4
  downstream_later:         # run AFTER stage 1, not now
    - "HumanEval"
    - "MBPP"
    - "GSM8K"
    - "MATH-500"

paths:
  checkpoints: "checkpoints/"
  runs: "runs/"
  results: "results/"
